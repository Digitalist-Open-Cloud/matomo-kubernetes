name: Schema

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema:
    name: Check values.schema.json is up to date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Install helm-schema
        run: |
          curl -sSL -o /tmp/helm-schema.tar.gz \
            https://github.com/dadav/helm-schema/releases/download/0.23.4/helm-schema_0.23.4_Linux_x86_64.tar.gz
          sudo tar xzf /tmp/helm-schema.tar.gz -C /usr/local/bin helm-schema
          helm-schema --version

      - name: Generate values.schema.json
        run: |
          helm-schema \
            --chart-search-root charts/matomo \
            --helm-docs-compatibility-mode \
            --no-dependencies \
            --skip-auto-generation required

      - name: Fail if values.schema.json is missing or out of date
        run: |
          # git diff --exit-code alone misses the case where the file is newly
          # generated and not yet tracked, so check status first.
          if [ -n "$(git status --porcelain -- charts/matomo/values.schema.json)" ]; then
            git diff -- charts/matomo/values.schema.json || true
            echo "::error file=charts/matomo/values.schema.json::values.schema.json is missing or out of date. Regenerate it with 'helm-schema --chart-search-root charts/matomo --helm-docs-compatibility-mode --no-dependencies --skip-auto-generation required' and commit the result."
            exit 1
          fi
