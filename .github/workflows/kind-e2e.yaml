name: E2E (kind)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Install chart on kind
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      # ── Database / caching fixtures ────────────────────────────────────
      - name: Install MariaDB and Valkey
        run: |
          kubectl create namespace matomo
          kubectl apply -f tests/kind/mariadb.yaml -f tests/kind/valkey.yaml
          kubectl -n matomo rollout status deployment/matomo-db-mysql --timeout=300s
          kubectl -n matomo rollout status deployment/matomo-valkey --timeout=300s

      # ── Ingress infrastructure (ingress-nginx) ─────────────────────────
      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/cloud/deploy.yaml
          kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=300s

      # ── Gateway API infrastructure (cloud-provider-kind) ───────────────
      - name: Install cloud-provider-kind
        run: |
          set -euo pipefail

          VERSION="${CLOUD_PROVIDER_KIND_VERSION:-v0.11.1}"

          curl -sL "https://github.com/kubernetes-sigs/cloud-provider-kind/releases/download/${VERSION}/cloud-provider-kind_${VERSION#v}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin/ cloud-provider-kind

          echo "Starting cloud-provider-kind..."
          sudo cloud-provider-kind --gateway-channel standard &
          sleep 5

      - name: Wait for and verify GatewayClass from cloud-provider-kind
        run: |
          set -euo pipefail
          kubectl wait --for=condition=Accepted gatewayclass/cloud-provider-kind \
            --timeout=60s || {
              echo "ERROR: GatewayClass not ready!"
              kubectl get gatewayclass -A -o wide
              exit 1
            }
          echo "✅ cloud-provider-kind GatewayClass ready"

      # ── Deploy Gateway fixture ────────────────────────────────────────
      - name: Deploy gateway.yaml fixture
        run: |
          set -euo pipefail
          kubectl apply -f tests/kind/gateway.yaml

      - name: Wait for Gateway → Programmed
        run: |
          set -euo pipefail
          kubectl -n matomo wait --for=condition=Programmed \
            gateway/matomo-gateway --timeout=120s || {
              echo "Gateway did not reach Programmed state"
              echo "=== Events ==="; kubectl describe gateway matomo-gateway -n matomo
              exit 1
            }
          echo "✅ Gateway programed"

      # ── Install Matomo chart (ingress + gatewayApi) ────────────────────
      - name: Install Matomo chart
        run: |
          helm install matomo charts/matomo --namespace matomo \
            --values tests/kind/values.yaml

      - name: Wait for Matomo workloads
        run: |
          for d in matomo-dashboard matomo-tracker matomo-cli \
                   matomo-queuedtracking-monitor matomo-queuedtracking-process; do
            echo "::group::rollout $d"
            kubectl -n matomo rollout status "deployment/$d" --timeout=600s
            echo "::endgroup::"
          done

      # ── Smoke tests ────────────────────────────────────────────────────
      - name: Smoke test dashboard and tracker (in-cluster)
        run: |
          kubectl -n matomo run smoke --rm -i --restart=Never \
            --image=curlimages/curl:8.14.1 --command -- sh -c '
            set -e
            echo "dashboard /index.php"
            curl -sSf -o /dev/null http://matomo-dashboard:8080/index.php
            echo "tracker /matomo.js"
            curl -sSf -o /dev/null http://matomo-tracker:8080/matomo.js
            echo "tracker hit /matomo.php"
            code=$(curl -sS -o /dev/null -w "%{http_code}" "http://matomo-tracker:8080/matomo.php?idsite=1&rec=1&action_name=ci-smoke-test")
            echo "tracking hit returned HTTP $code"
            case "$code" in 200|204) ;; *) echo "unexpected tracking response"; exit 1 ;; esac
            '

      - name: Verify QueuedTracking uses Valkey
        run: |
          connections=$(kubectl -n matomo exec deployment/matomo-valkey -- \
            valkey-cli INFO stats | grep -oE "total_connections_received:[0-9]+" | cut -d: -f2)
          echo "Valkey total_connections_received=$connections"
          if [ "$connections" -le 5 ]; then
            echo "almost no connections to Valkey - QueuedTracking is not wired up"
            exit 1
          fi

      # ── Ingress routing test (via ingress-nginx) ───────────────────────
      - name: Test routing through ingress-nginx
        run: |
          kubectl -n matomo run ingress-smoke --rm -i --restart=Never \
            --image=curlimages/curl:8.14.1 --command -- sh -c '
            set -e
            HOST=ingress-nginx-controller.ingress-nginx.svc.cluster.local
            echo "dashboard /index.php via ingress-nginx"
            curl -sSf -o /dev/null -H "Host: dashboard.example.test" "http://$HOST/index.php"
            echo "tracker /matomo.js via ingress-nginx"
            curl -sSf -o /dev/null -H "Host: tracker.example.test" "http://$HOST/matomo.js"
            echo "tracking hit /matomo.php via ingress-nginx"
            code=$(curl -sS -o /dev/null -w "%{http_code}" -H "Host: tracker.example.test" \
              "http://$HOST/matomo.php?idsite=1&rec=1&action_name=ci-ingress-nginx")
            echo "tracking hit returned HTTP $code"
            case "$code" in 200|204) ;; *) echo "unexpected tracking response via ingress-nginx"; exit 1 ;; esac
            '

      # ── Gateway API routing test (via HTTPRoute) ───────────────────────
      - name: Get Gateway IP
        id: gateway-ip
        run: |
          GW_IP=$(kubectl get gateway matomo-gateway -n matomo \
            -o json | jq -r '.status.addresses[] | select(.type=="IPAddress") | .value' | head -1)
          if [ -z "$GW_IP" ]; then
            echo "Failed to get Gateway IP — the Gateway might not be programmed"
            kubectl get gateway matomo-gateway -n matomo -o yaml || true
            exit 1
          fi
          echo "Gateway IP: $GW_IP"
          echo "$GW_IP" > /tmp/gw_ip.txt

      - name: Wait for Matomo services to be routable
        run: |
          set +e
          GW_IP=$(cat /tmp/gw_ip.txt)
          max=90 i=0
          until [ $i -ge $max ]; do
            status=$(curl -sf --max-time 5 \
              -H 'Host: dashboard.example.test' \
              "http://$GW_IP/index.php" -o /dev/null -w '%{http_code}' || echo 000)
            if [ "$status" != "000" ]; then
              echo "Matomo Dashboard reachable (HTTP $status) after ${i}s"
              break
            fi
            i=$((i+5)); sleep ${i>99?1:0}
          done
          if [ $i -ge $max ]; then
            echo "Dashboard unreachable to HTTPRoute after ${max}s — Matomo may not have started yet"
            exit 1
          fi

      - name: Test cron jobs (core:archive and scheduled-tasks)
        run: |
          for cj in matomo-jobs-corearchive matomo-jobs-scheduled-tasks; do
            kubectl -n matomo create job "e2e-$cj" --from="cronjob/$cj"
          done
          fail=0
          for cj in matomo-jobs-corearchive matomo-jobs-scheduled-tasks; do
            echo "::group::job e2e-$cj"
            if ! kubectl -n matomo wait --for=condition=complete "job/e2e-$cj" --timeout=420s; then
              echo "::error::$cj did not complete"
              fail=1
            fi
            kubectl -n matomo logs "job/e2e-$cj" --all-containers --tail=50 || true
            echo "::endgroup::"
          done
          exit $fail

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "::group::resources"
          kubectl get all -n matomo || true
          kubectl -n matomo get events --sort-by=.lastTimestamp | tail -n 50 || true
          kubectl -n matomo get ingress,httproute,gateway -o wide || true
          echo "::endgroup::"
          echo "::group::routing controllers"
          kubectl -n ingress-nginx get pods || true
          kubectl -n ingress-nginx logs deployment/ingress-nginx-controller --tail=50 || true
          kubectl get gatewayclass -o wide || true
          echo "::endgroup::"
          for p in $(kubectl -n matomo get pods -o name); do
            echo "::group::$p"
            kubectl -n matomo describe "$p" | tail -n 40 || true
            kubectl -n matomo logs "$p" --all-containers --tail=100 || true
            echo "::endgroup::"
          done
