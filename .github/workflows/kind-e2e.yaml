name: E2E (kind)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Install chart on kind
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Install metallb for kind LoadBalancer support
        run: |
          kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
          kubectl rollout status deployment/controller -n metallb-system --timeout=90s
          cat <<EOF | kubectl apply -f -
          apiVersion: metallb.io/v1beta1
          kind: AddressPool
          metadata:
            name: default
            namespace: metallb-system
          spec:
            protocol: layer2
            addresses:
              - 172.18.255.0/24
          EOF

      - name: Install ingress-nginx and Envoy Gateway
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/cloud/deploy.yaml
          helm install eg oci://docker.io/envoyproxy/gateway-helm --version v1.8.2 \
            --namespace envoy-gateway-system --create-namespace
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=120s
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=120s

      - name: Install MariaDB and Valkey
        run: |
          kubectl create namespace matomo
          kubectl apply -f tests/kind/mariadb.yaml -f tests/kind/valkey.yaml -f tests/kind/gateway.yaml
          kubectl -n matomo rollout status deployment/matomo-db-mysql --timeout=300s
          kubectl -n matomo rollout status deployment/matomo-valkey --timeout=300s

      - name: Install Matomo chart
        run: |
          helm install matomo charts/matomo --namespace matomo --values tests/kind/values.yaml

      - name: Wait for Matomo workloads
        run: |
          for d in matomo-dashboard matomo-tracker matomo-cli \
                   matomo-queuedtracking-monitor matomo-queuedtracking-process; do
            echo "::group::rollout $d"
            kubectl -n matomo rollout status "deployment/$d" --timeout=600s
            echo "::endgroup::"
          done

      - name: Smoke test dashboard and tracker
        run: |
          kubectl -n matomo run smoke --rm -i --restart=Never \
            --image=curlimages/curl:8.14.1 --command -- sh -c '
            set -e
            echo "dashboard /index.php"
            curl -sSf -o /dev/null http://matomo-dashboard:8080/index.php
            echo "tracker /matomo.js"
            curl -sSf -o /dev/null http://matomo-tracker:8080/matomo.js
            echo "tracker hit /matomo.php"
            code=$(curl -sS -o /dev/null -w "%{http_code}" "http://matomo-tracker:8080/matomo.php?idsite=1&rec=1&action_name=ci-smoke-test")
            echo "tracking hit returned HTTP $code"
            case "$code" in
              200|204) ;;
              *) echo "unexpected tracking response" ; exit 1 ;;
            esac
          '

      - name: Wait for routing controllers
        run: |
          kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=300s
          kubectl -n envoy-gateway-system rollout status deployment/envoy-gateway --timeout=300s
          kubectl -n matomo wait --for=condition=Programmed gateway/matomo-gateway --timeout=180s

      - name: Test routing through ingress-nginx and Gateway API
        run: |
          # Envoy Gateway creates one service per Gateway with a generated name
          ENVOY_SVC=$(kubectl get svc -n envoy-gateway-system \
            -l gateway.envoyproxy.io/owning-gateway-name=matomo-gateway,gateway.envoyproxy.io/owning-gateway-namespace=matomo \
            -o jsonpath='{.items[0].metadata.name}')
          echo "Envoy service: $ENVOY_SVC"
          kubectl -n matomo run routing-smoke --rm -i --restart=Never \
            --image=curlimages/curl:8.14.1 \
            --env="INGRESS=ingress-nginx-controller.ingress-nginx.svc.cluster.local" \
            --env="GATEWAY=$ENVOY_SVC.envoy-gateway-system.svc.cluster.local" \
            --command -- sh -c '
            set -e
            for entry in "$INGRESS ingress-nginx" "$GATEWAY gateway-api"; do
              host=${entry% *}; label=${entry#* }
              echo "--- $label: dashboard /index.php"
              curl -sSf -o /dev/null -H "Host: dashboard.example.test" "http://$host/index.php"
              echo "--- $label: tracker /matomo.js"
              curl -sSf -o /dev/null -H "Host: tracker.example.test" "http://$host/matomo.js"
              echo "--- $label: tracking hit /matomo.php"
              code=$(curl -sS -o /dev/null -w "%{http_code}" -H "Host: tracker.example.test" \
                "http://$host/matomo.php?idsite=1&rec=1&action_name=ci-$label")
              echo "$label tracking hit returned HTTP $code"
              case "$code" in
                200|204) ;;
                *) echo "unexpected tracking response via $label" ; exit 1 ;;
              esac
            done
          '

      - name: Verify QueuedTracking uses Valkey
        run: |
          # The tracking hit above should have been queued in Valkey by the
          # QueuedTracking plugin (and consumed by the process worker).
          connections=$(kubectl -n matomo exec deployment/matomo-valkey -- \
            valkey-cli INFO stats | grep -oE "total_connections_received:[0-9]+" | cut -d: -f2)
          commands=$(kubectl -n matomo exec deployment/matomo-valkey -- \
            valkey-cli INFO stats | grep -oE "total_commands_processed:[0-9]+" | cut -d: -f2)
          echo "Valkey total_connections_received=$connections total_commands_processed=$commands"
          kubectl -n matomo exec deployment/matomo-valkey -- valkey-cli --scan || true
          # The queuedtracking:process worker reconnects every few seconds, so a
          # wired-up install accumulates far more connections than our own execs.
          if [ "$connections" -le 5 ]; then
            echo "almost no connections to Valkey - QueuedTracking is not wired up"
            exit 1
          fi

      - name: Test cron jobs (core:archive and scheduled-tasks)
        run: |
          # trigger both CronJobs manually and require them to complete
          for cj in matomo-jobs-corearchive matomo-jobs-scheduled-tasks; do
            kubectl -n matomo create job "e2e-$cj" --from="cronjob/$cj"
          done
          fail=0
          for cj in matomo-jobs-corearchive matomo-jobs-scheduled-tasks; do
            echo "::group::job e2e-$cj"
            if ! kubectl -n matomo wait --for=condition=complete "job/e2e-$cj" --timeout=420s; then
              echo "::error::$cj did not complete"
              fail=1
            fi
            kubectl -n matomo logs "job/e2e-$cj" --all-containers --tail=50 || true
            echo "::endgroup::"
          done
          exit $fail

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "::group::resources"
          kubectl get all -n matomo || true
          kubectl -n matomo get events --sort-by=.lastTimestamp | tail -n 50 || true
          kubectl -n matomo get ingress,httproute,gateway -o wide || true
          echo "::endgroup::"
          echo "::group::routing controllers"
          kubectl -n ingress-nginx logs deployment/ingress-nginx-controller --tail=50 || true
          kubectl -n envoy-gateway-system get pods || true
          kubectl -n envoy-gateway-system logs deployment/envoy-gateway --tail=50 || true
          echo "::endgroup::"
          for p in $(kubectl -n matomo get pods -o name); do
            echo "::group::$p"
            kubectl -n matomo describe "$p" | tail -n 40 || true
            kubectl -n matomo logs "$p" --all-containers --tail=100 || true
            kubectl -n matomo logs "$p" -c matomo-init --tail=100 || true
            echo "::endgroup::"
          done
