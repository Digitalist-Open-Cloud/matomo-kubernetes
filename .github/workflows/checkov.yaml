name: Checkov

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov scan
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for upload-sarif to push results to the Security tab
      actions: read # required for upload-sarif on private repositories
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: charts/matomo
          framework: helm
          quiet: true # display only failed checks
          soft_fail: false # fail the build on findings
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF file
        # run even when the scan step failed, so findings reach the Security tab
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
