name: E2E (Gateway API)

on:
  push:
    branches: [ main ]
    paths:
      - 'charts/matomo/templates/httproute*'
      - '.github/workflows/kind-gateway.yaml'
      - 'tests/kind/gateway-api-*'
      - 'tests/kind/gateway.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/matomo/templates/httproute*'
      - '.github/workflows/kind-gateway.yaml'
      - 'tests/kind/gateway-api-*'
      - 'tests/kind/gateway.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway-e2e:
    name: Gateway API routing test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      # ── Step 1: Gateway API CRDs (standard channel) ────────────────────
      - name: Install Gateway API CRDs + standard resources
        run: |
          set -euo pipefail
          curl -sL https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.3.0/standard-install.yaml \
            | kubectl apply -f -
          # ── FIX: use / not . between kind and name ────────────────
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io \
                         crd/httproutes.gateway.networking.k8s.io \
                         crd/gatewayclasses.gateway.networking.k8s.io \
            --timeout=60s

      # ── Step 2: cloud-provider-kind (no MetalLB needed) ────────────────
      - name: Install cloud-provider-kind
        run: |
          set -euo pipefail
          arch=$(uname -m)
          case "$arch" in
            x86_64) os=linux;   arch=amd64 ;;
            aarch64|arm64) os=darwin; arch=arm64 ;;
            *) echo "unsupported arch: $arch"; exit 1 ;;
          esac
          # cloud-provider-kind releases are on GitHub, use the latest
          url="https://github.com/kubernetes-sigs/cloud-provider-kind/releases/latest/download/cloud-provider-kind-${os}-${arch}"
          curl -sL "$url" -o ~/.local/bin/cloud-provider-kind
          chmod +x ~/.local/bin/cloud-provider-kind
          export PATH="$HOME/.local/bin:$PATH"

          echo "Starting cloud-provider-kind in background..."
          sudo cloud-provider-kind --gateway-channel standard &
          sleep 5   # let it create the GatewayClass before we apply anything

      - name: Verify GatewayClass exists
        run: |
          kubectl get gatewayclass cloud-provider-kind && \
            echo "cloud-provider-kind ready" || \
            echo "WARN: GatewayClass not yet provisioned (may appear a few seconds later)"

      # ── Step 3: Apply cluster infrastructure (Gateway fixture only) ────
      - name: Create matomo namespace + deploy gateway.yaml fixture
        run: |
          set -euo pipefail
          kubectl create ns matomo --dry-run=client -o yaml | kubectl apply -f -

          # Replace the GatewayClass reference in our fixture to use cloud-provider-kind
          sed 's/gatewayClassName: envoy/gatewayClassName: cloud-provider-kind/' \
            tests/kind/gateway.yaml | kubectl apply -f -

      - name: Wait for Gateway → Programmed
        run: |
          set -euo pipefail
          kubectl -n matomo wait --for=condition=Programmed \
            gateway/matomo-gateway --timeout=60s

      # ── Step 4: (future) Matomo deployment + routing smoke test ────────
