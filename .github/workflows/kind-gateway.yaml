name: E2E (Gateway API)

on:
  push:
    branches: [ main ]
    paths:
      - 'charts/matomo/templates/httproute*'
      - '.github/workflows/kind-gateway.yaml'
      - 'tests/kind/gateway-api-*'
      - 'tests/kind/gateway.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/matomo/templates/httproute*'
      - '.github/workflows/kind-gateway.yaml'
      - 'tests/kind/gateway-api-*'
      - 'tests/kind/gateway.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gateway-e2e:
    name: Gateway API routing test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      # ── Step 1: Gateway API CRDs + wait for them ───────────────────────
      - name: Install Gateway API CRDs + standard resources
        run: |
          set -euo pipefail
          curl -sL https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.3.0/standard-install.yaml \
            | kubectl apply -f -
          
          # ── Fix: use / (not .) to separate kind from name ────────────
          kubectl wait --for=condition=Established \
            crd/gateways.gateway.networking.k8s.io \
            crd/httproutes.gateway.networking.k8s.io \
            crd/gatewayclasses.gateway.networking.k8s.io \
            --timeout=60s

      # ── Step 2: Install cloud-provider-kind (not MetalLB!) ──────────────
      - name: Install cloud-provider-kind
        run: |
          set -euo pipefail
          
          VERSION="${CLOUD_PROVIDER_KIND_VERSION:-v0.11.1}"
          
          # Download and extract tarball (releases are tar.gz, not raw binaries)
          curl -sL "https://github.com/kubernetes-sigs/cloud-provider-kind/releases/download/${VERSION}/cloud-provider-kind_${VERSION#v}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin/ cloud-provider-kind
          
          # Run as background service (sudo needed per readme)
          echo "Starting cloud-provider-kind..."
          sudo cloud-provider-kind --gateway-channel standard &
          sleep 5   # let it create the GatewayClass before we apply anything

      - name: Wait for and verify GatewayClass from cloud-provider-kind
        run: |
          set -euo pipefail
          kubectl wait --for=condition=Accepted gatewayclass/cloud-provider-kind \
            --timeout=60s || {
              echo "ERROR: GatewayClass not ready!"
              kubectl get gatewayclass -A -o wide
              exit 1
            }
          echo "✅ cloud-provider-kind GatewayClass ready"

      # ── Step 3: Cluster infrastructure (GatewayClass + Gateway fixture) ──
      - name: Deploy matomo namespace and gateway.yaml fixture
        run: |
          set -euo pipefail
          
          # Apply the cluster-level namespaces and Gateway API resources
          kubectl apply -f tests/kind/gateway.yaml

      - name: Debug Gateway status if Programmed wait fails
        if: failure()
        run: |
          set +e
          echo "=== GatewayClass ==="
          kubectl get gatewayclass -A -o wide
          echo "\n=== Events for cloud-provider-kind ==="
          kubectl describe gatewayclass cloud-provider-kind
          echo "\n=== All Gateway objects ==="
          kubectl get gateways -A
          echo "\n=== Detailed Gateway status ==="
          kubectl get gateway matomo-gateway -n matomo -o yaml | grep -A20 status:
          echo "\n=== Events for matomo-gateway ==="
          kubectl describe gateway matomo-gateway --namespace matomo
        continue-on-error: true
