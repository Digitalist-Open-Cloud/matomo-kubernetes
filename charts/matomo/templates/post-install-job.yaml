{{- if .Values.matomo.postInstallCommand }}
apiVersion: batch/v1
kind: Job
metadata:
  name: matomo-post-install
  namespace: {{.Values.namespace}}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    partOf: matomo
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{ .Release.Name }}"
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
      annotations:
{{ include "matomo.podAnnotations" . | indent 8 }}
    spec:
      automountServiceAccountToken: {{ .Values.matomo.automountServiceAccountToken }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Never
{{ include "matomo.images.pullSecrets" ( dict "images" (list .Values.matomo) "global" .Values.global) | nindent 6 }}
      # Self-provision config.ini.php the same way regular pods do, instead of
      # depending on an externally supplied config.
      initContainers:
{{ include "matomo.waitForDb" . | nindent 8 }}
{{ include "matomo.initContainer" . | nindent 8 }}
      containers:
      - name: post-install-matomo
        image: {{.Values.matomo.image}}
        imagePullPolicy: Always
        {{- if .Values.matomo.postInstallResources }}
        resources:
{{ toYaml .Values.matomo.postInstallResources | indent 10 }}
        {{- end }}
        securityContext:
          runAsUser: {{.Values.matomo.runAsUser}}
          runAsNonRoot: true
          privileged: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        # To do anything with Matomo, we first need to bootstrap it (curl).
        command:  [ 'bash' , '-c' , 'sleep {{.Values.matomo.postInstallSleepTime}}; curl -Il --max-time 10 https://{{.Values.matomo.dashboard.hostname}}; {{.Values.matomo.postInstallCommand}}' ]
        volumeMounts:
        - name: static-data
          mountPath: /var/www/html
{{- if .Values.extraVolumeMounts }}
{{ toYaml .Values.extraVolumeMounts | indent 8 }}
{{- end }}
      volumes:
        - name: matomo-configuration
          configMap:
            name: matomo-configuration
        - name: static-data
          emptyDir: {}
{{- if .Values.extraVolumes }}
{{ toYaml .Values.extraVolumes | indent 8 }}
{{- end }}
{{- end -}}


