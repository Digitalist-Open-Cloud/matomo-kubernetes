---
{{- if .Values.matomo.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matomo-dashboard
  namespace: {{.Values.namespace}}
  labels:
    app: matomo-dashboard
{{- if .Values.matomo.extralabels }}
{{ toYaml .Values.matomo.extralabels | indent 4 }}
{{- end }}
spec:
  replicas: {{.Values.matomo.dashboard.replicas}}
  selector:
    matchLabels:
      app: matomo-dashboard
  template:
    metadata:
      labels:
        app: matomo-dashboard
{{- if .Values.matomo.extralabels }}
{{ toYaml .Values.matomo.extralabels | indent 8 }}
{{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-matomo.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: {{ .Values.matomo.automountServiceAccountToken }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
{{ include "matomo.init" . | nindent 6 }}
      containers:
        {{- if .Values.matomo.dashboard.sidecars }}
{{ toYaml .Values.matomo.dashboard.sidecars | indent 6 }}
        {{- end }}
      - name: fpm-metrics
        securityContext:
          runAsUser: {{.Values.matomo.runAsUser}}
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
        image: hipages/php-fpm_exporter:2.2.0
        imagePullPolicy: Always
        env:
        - name: PHP_FPM_FIX_PROCESS_COUNT
          value: "true"
        livenessProbe: {{- include "matomo.probe" (dict "override" .Values.matomo.dashboard.exporter.livenessProbe "default" (include "matomo.probe.default.exporter.liveness" .)) | nindent 10 }}
        readinessProbe: {{- include "matomo.probe" (dict "override" .Values.matomo.dashboard.exporter.readinessProbe "default" (include "matomo.probe.default.exporter.readiness" .)) | nindent 10 }}
        {{- if .Values.matomo.dashboard.exporter.resources }}
        resources:
{{ toYaml .Values.matomo.dashboard.exporter.resources | indent 10 }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: 9253
      - name: nginx
        {{- if .Values.matomo.dashboard.nginx.image }}
        image: {{.Values.matomo.dashboard.nginx.image}}
        {{ else }}
        image: {{.Values.nginx.image}}
        {{- end }}
        imagePullPolicy: Always
        {{- if .Values.nginx.resources }}
        resources:
{{ toYaml .Values.nginx.resources | indent 10 }}
        {{- end }}
        readinessProbe: {{- include "matomo.probe" (dict "override" .Values.matomo.dashboard.nginx.readinessProbe "default" (include "matomo.probe.default.nginx.dashboard.readiness" .)) | nindent 10 }}
        livenessProbe: {{- include "matomo.probe" (dict "override" .Values.matomo.dashboard.nginx.livenessProbe "default" (include "matomo.probe.default.nginx.liveness" .)) | nindent 10 }}
        securityContext:
          runAsUser: {{.Values.nginx.runAsUser}}
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
        volumeMounts:
          - name: nginx-conf
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
            readOnly: true
          - name: fastcgi-params
            mountPath: /etc/nginx/fastcgi_params
            subPath: fastcgi_params
            readOnly: true
          - name: mime-types
            mountPath: /etc/nginx/mime.types
            subPath: mime.types
            readOnly: true
          - name: static-data
            mountPath: /var/www/html
            readOnly: true
        ports:
        - containerPort: 8080
      - name: matomo
        image: {{.Values.matomo.image}}
        {{- if .Values.matomo.resources }}
        resources:
{{ toYaml .Values.matomo.resources | indent 10 }}
        {{- end }}
        securityContext:
          runAsUser: {{.Values.matomo.runAsUser}}
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
        imagePullPolicy: Always
        env:
          - name: MATOMO_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.db.password.secretKeyRef.name }}
                key: {{ .Values.db.password.secretKeyRef.key }}
          {{- range .Values.matomo.env }}
          {{- if .valueFromSecret }}
          - name: {{ .name }}
            valueFrom:
              secretKeyRef:
                name: {{ .valueFromSecret.secretName | quote }}
                key: {{ .valueFromSecret.key | quote }}
          {{- else if .value }}
          - name: {{ .name }}
            value: {{ .value | quote }}
          {{- end }}
          {{- end }}
{{- include "matomo.license" . | nindent 10  }}
        ports:
        - containerPort: 9000
        volumeMounts:
          - name: static-data
            mountPath: /var/www/html
          - name: matomo-phpfpm
            mountPath: /usr/local/etc/php-fpm.d/zz-global.conf
            subPath: zz-global.conf
          - name: matomo-dashboard-php
            mountPath: /usr/local/etc/php/conf.d/zz-global.ini
            subPath: zz-global.ini
{{- if .Values.extraVolumeMounts }}
{{ toYaml .Values.extraVolumeMounts | indent 10 }}
{{- end }}
        livenessProbe: {{- include "matomo.probe" (dict "override" .Values.matomo.livenessProbe "default" (include "matomo.probe.default.phpfpm.liveness" .)) | nindent 10 }}
        readinessProbe: {{- include "matomo.probe" (dict "override" .Values.matomo.readinessProbe "default" (include "matomo.probe.default.phpfpm.readiness" .)) | nindent 10 }}
{{ include "matomo.images.pullSecrets" ( dict "images" (list .Values.matomo) "global" .Values.global) | nindent 6 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: nginx-conf
        configMap:
          name: nginx-matomo-dashboard
          items:
          - key: nginx.conf
            path: nginx.conf
      - name: fastcgi-params
        configMap:
          name: nginx-matomo-dashboard
          items:
          - key: fastcgi_params
            path: fastcgi_params
      - name: mime-types
        configMap:
          name: nginx-matomo-dashboard
          items:
          - key: mime.types
            path: mime.types
      - name: matomo-configuration
        configMap:
          name: matomo-configuration
      - name: matomo-phpfpm
        configMap:
          name: matomo-phpfpm
      - name: matomo-dashboard-php
        configMap:
          name: matomo-dashboard-php
      - name: static-data
        emptyDir: {}
{{- if .Values.extraVolumes }}
{{ toYaml .Values.extraVolumes | indent 6 }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: matomo-dashboard
  namespace: {{.Values.namespace}}
  labels:
    app: matomo-dashboard
{{- if .Values.matomo.extralabels }}
{{ toYaml .Values.matomo.extralabels | indent 4 }}
{{- end }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9253"
    prometheus.io/path: "/metrics"
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
    - name: metrics
      port: 9253
      targetPort: metrics
      protocol: TCP
  selector:
    app: matomo-dashboard
{{- end -}}
