{{- if and .Values.matomo.gatewayApi.enabled .Values.matomo.dashboard.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matomo-dashboard
  namespace: {{.Values.namespace}}
  labels:
    app: matomo-dashboard
{{- if .Values.matomo.gatewayApi.extralabels }}
{{ toYaml .Values.matomo.gatewayApi.extralabels | indent 4 }}
{{- end }}
spec:
  parentRefs:
{{ toYaml .Values.matomo.gatewayApi.parentRefs | indent 4 }}
  hostnames:
    - {{.Values.matomo.dashboard.hostname}}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        {{- if .Values.matomo.dashboard.loadbalancer }}
        - name: matomo-dashboard-lb
          port: 80
        {{- else }}
        - name: matomo-dashboard
          port: 8080
        {{- end }}
{{- end }}
