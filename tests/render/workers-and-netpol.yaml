# Render combination: queued tracking workers scaled up, custom probes and
# resources, restrictive NetworkPolicy ingress rules, global registry.
global:
  imageRegistry: mirror.example.com
  imagePullSecrets:
    - my-registry-key
matomo:
  imagePullSecrets:
    - matomo-registry-key
  queuedTrackingMonitor:
    enabled: true
    replicas: 2
  queuedTrackingProcess:
    enabled: true
    replicas: 3
    numProcs: 2
  tracker:
    replicas: 3
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 1Gi
  livenessProbe:
    tcpSocket:
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    exec:
      command:
        - php-fpm-healthcheck
    initialDelaySeconds: 5
    periodSeconds: 5
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
        - port: 9253
          protocol: TCP
