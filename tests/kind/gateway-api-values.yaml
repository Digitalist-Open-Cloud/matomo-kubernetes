# Values for the Gateway API kind-based e2e test.
matomo:
  # Ingress is completely disabled — routing via Gateway API only.
  ingress:
    enabled: false

  # Activate the matrix's gatewayApi support and point to our fixture.
  gatewayApi:
    enabled: true
    parentRefs:
      - name: matomo-gateway
        namespace: matomo

  dashboard:
    hostname: dashboard.example.test

  tracker:
    hostname: tracker.example.test

  # The e2e test needs a worker to consume queued hits.
  queuedTrackingProcess:
    enabled: true

  config:
    PluginsInstalled:
      - Diagnostics DBStats Login CoreAdminHome UsersManager SitesManager Installation Monolog
        Intl CorePluginsAdmin CoreHome WebsiteMeasurable CoreVisualizations Proxy API Transitions
        Actions Referrers UserLanguage DevicesDetection Goals SEO Events UserCountry GeoIp2
        VisitsSummary VisitFrequency VisitTime VisitorInterest CoreUpdater CoreConsole
        UserCountryMap Live ImageGraph Annotations Insights Morpheus Contents DevicePlugins
        UserId CustomJsTracker ExtraTools LanguagesManager SegmentEditor Dashboard
        ScheduledReports PrivacyManager CustomVariables IntranetMeasurable Widgetize MultiSites
        Ecommerce RssWidget Feedback TwoFactorAuth MobileMessaging Overlay BulkTracking
        Resolution Heartbeat Marketplace ProfessionalServices UserConsole QueuedTracking

    Site:
      name: GatewayAPI-E2E
      url: https://localhost

    Config:
      log:
        log_level: ERROR
      General:
        show_update_notification_to_superusers_only: 1
        enable_trusted_host_check: 0
        enable_auto_update: 0
        browser_archiving_disabled_enforce: 1
        session_save_handler: dbtable
        enable_marketplace: 0
        piwik_pro_ads_enabled: 0
      QueuedTracking:
        backend: redis
        redisHost: matomo-valkey
        redisPort: 6379
        queueEnabled: 1
        numQueueWorkers: 1
        numRequestsToProcess: 1
        processDuringTrackingRequest: 0
